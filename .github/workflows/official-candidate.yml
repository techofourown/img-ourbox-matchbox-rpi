name: Official Candidate Build & Publish (Matchbox)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'CLAUDE.md'

permissions:
  contents: read
  packages: write

concurrency:
  group: official-candidate-matchbox
  cancel-in-progress: false

jobs:
  build-publish:
    runs-on: [self-hosted, official-heavy, pi-image]
    timeout-minutes: 240

    steps:
      - name: Fix workspace ownership from previous build
        run: sudo chown -R "$(id -u):$(id -g)" "${GITHUB_WORKSPACE}" 2>/dev/null || true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set build identity
        run: echo "OURBOX_VERSION=main-${GITHUB_SHA:0:12}" >> "${GITHUB_ENV}"

      - name: Bootstrap host dependencies
        run: sudo ./tools/bootstrap-host.sh

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Fetch curated upstream inputs
        run: ./tools/fetch-airgap-platform.sh

      - name: Build OS image
        run: sudo -E ./tools/build-image.sh
        env:
          OURBOX_TARGET: rpi
          OURBOX_VARIANT: prod
          OURBOX_REQUIRE_EXPLICIT_VERSION: "1"

      - name: Reclaim build output ownership
        run: sudo chown -R "$(id -u):$(id -g)" deploy/

      - name: Publish OS artifact (official beta)
        run: ./tools/publish-os-artifact-official.sh beta

      - name: Resolve installer default OS ref
        run: |
          set -euo pipefail
          echo "OS_DEFAULT_REF=$(cat deploy/os-artifact.pinned.ref)" >> "${GITHUB_ENV}"

      - name: Build installer image
        run: sudo -E ./tools/build-installer-image.sh
        env:
          OURBOX_TARGET: rpi
          OURBOX_VARIANT: prod
          OS_REPO: ghcr.io/techofourown/ourbox-matchbox-os
          OS_DEFAULT_REF: ${{ env.OS_DEFAULT_REF }}
          INSTALL_DEFAULTS_REF: ""
          OURBOX_REQUIRE_EXPLICIT_VERSION: "1"
          OURBOX_REQUIRE_OS_DEFAULT_REF: "1"

      - name: Reclaim installer output ownership
        run: sudo chown -R "$(id -u):$(id -g)" deploy/

      - name: Smoke check baked installer defaults
        run: ./tools/check-installer-defaults-smoke.sh
        env:
          OURBOX_TARGET: rpi
          EXPECTED_OS_DEFAULT_REF: ${{ env.OS_DEFAULT_REF }}

      - name: Publish installer artifact (official beta)
        run: ./tools/publish-installer-artifact-official.sh beta

      - name: Upload provenance outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: provenance-candidate-${{ github.sha }}
          path: |
            deploy/os-artifact.ref
            deploy/os-artifact.pinned.ref
            deploy/os-artifact.digest
            deploy/os-artifact.meta.env
            deploy/installer-artifact.ref
            deploy/installer-artifact.pinned.ref
            deploy/installer-artifact.digest
            deploy/installer-artifact.meta.env
            deploy/installer-defaults.extracted.env
            deploy/installer-defaults-smoke.txt
          if-no-files-found: warn

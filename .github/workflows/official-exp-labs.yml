name: Official Exp-Labs Promote (Matchbox)

on:
  workflow_run:
    workflows: ["Official Candidate Build & Publish (Matchbox)"]
    types: [completed]

permissions:
  actions: read
  contents: read
  packages: write

concurrency:
  group: official-exp-labs-matchbox-${{ github.event.workflow_run.head_sha || github.run_id }}
  cancel-in-progress: false

jobs:
  promote:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout candidate revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Resolve authorized exp-labs release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="$(./tools/resolve-promotable-release.sh exp-labs "${{ github.event.workflow_run.head_sha }}" || true)"
          if [[ -z "${tag}" ]]; then
            echo "No prerelease exp-labs release found for candidate commit ${{ github.event.workflow_run.head_sha }}; skipping."
            exit 0
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Download candidate provenance
        if: steps.release.outputs.tag != ''
        uses: actions/download-artifact@v4
        with:
          name: provenance-candidate-${{ github.event.workflow_run.head_sha }}
          path: deploy/candidate-provenance
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Load candidate provenance inputs
        if: steps.release.outputs.tag != ''
        run: |
          set -euo pipefail
          find_file() {
            local name="$1"
            local file
            file="$(find deploy/candidate-provenance -type f -name "${name}" | head -n1 || true)"
            [[ -n "${file}" ]] || {
              echo "Missing ${name} in downloaded candidate provenance" >&2
              exit 1
            }
            cat "${file}"
          }
          printf 'RELEASE_TAG=%s\n' "${{ steps.release.outputs.tag }}" >> "${GITHUB_ENV}"
          printf 'OS_SOURCE_REF=%s\n' "$(find_file os-artifact.ref)" >> "${GITHUB_ENV}"
          printf 'OS_SOURCE_PINNED_REF=%s\n' "$(find_file os-artifact.pinned.ref)" >> "${GITHUB_ENV}"
          printf 'INSTALLER_SOURCE_REF=%s\n' "$(find_file installer-artifact.ref)" >> "${GITHUB_ENV}"
          printf 'INSTALLER_SOURCE_PINNED_REF=%s\n' "$(find_file installer-artifact.pinned.ref)" >> "${GITHUB_ENV}"

      - name: Promote OS artifact to exp-labs
        if: steps.release.outputs.tag != ''
        run: ./tools/promote-os-artifact-official.sh exp-labs
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          PROMOTE_SOURCE_REF: ${{ env.OS_SOURCE_REF }}
          PROMOTE_SOURCE_PINNED_REF: ${{ env.OS_SOURCE_PINNED_REF }}

      - name: Promote installer artifact to exp-labs
        if: steps.release.outputs.tag != ''
        run: ./tools/promote-installer-artifact-official.sh exp-labs
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          PROMOTE_SOURCE_REF: ${{ env.INSTALLER_SOURCE_REF }}
          PROMOTE_SOURCE_PINNED_REF: ${{ env.INSTALLER_SOURCE_PINNED_REF }}

      - name: Upload provenance outputs
        uses: actions/upload-artifact@v4
        if: steps.release.outputs.tag != '' && always()
        with:
          name: provenance-exp-labs-${{ steps.release.outputs.tag }}
          path: |
            deploy/os-artifact.ref
            deploy/os-artifact.pinned.ref
            deploy/os-artifact.digest
            deploy/os-artifact.meta.env
            deploy/os-artifact.promote.source.ref
            deploy/installer-artifact.ref
            deploy/installer-artifact.pinned.ref
            deploy/installer-artifact.digest
            deploy/installer-artifact.meta.env
            deploy/installer-artifact.promote.source.ref
          if-no-files-found: warn

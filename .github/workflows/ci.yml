name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  sanitization:
    name: Public repo sanitization check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for forbidden internal infrastructure details
        run: bash tools/check-public-sanitization.sh

  shellcheck:
    name: Shell script lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y --no-install-recommends shellcheck

      - name: Run shellcheck on build/publish scripts
        run: |
          shellcheck tools/*.sh
          shellcheck tools/release-control/*.sh

      - name: Check shell syntax (bash -n)
        run: |
          for f in tools/*.sh; do
            bash -n "${f}" && echo "OK: ${f}"
          done
          for f in tools/release-control/*.sh; do
            bash -n "${f}" && echo "OK: ${f}"
          done

  resolver-sync:
    name: Vendored resolver sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify vendored installer-selection resolver
        run: bash tools/check-vendored-installer-selection-resolver.sh

  installer-ssh-vendoring:
    name: Vendored installer SSH helper sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify vendored installer SSH helper
        run: bash tools/check-vendored-installer-ssh-helper.sh

  installer-ssh-policy:
    name: Installer SSH policy smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run installer SSH policy smoke
        run: bash tools/check-installer-ssh-policy-smoke.sh

  platform-contract-shape:
    name: Platform contract shape smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run platform contract shape smoke
        run: bash tools/check-validate-platform-contract-shape-smoke.sh

  release-control-vendoring:
    name: Vendored release-control sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify vendored release-control module
        run: bash tools/check-vendored-release-control.sh

  release-control-smoke:
    name: Release-control smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run release-control smoke test
        run: bash tools/check-release-control-smoke.sh

  os-publish-smoke:
    name: OS publish smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run OS publish smoke test
        run: bash tools/check-publish-os-artifact-smoke.sh

  workflow-safety:
    name: Workflow trust boundary check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check workflow trust boundaries
        run: bash tools/check-workflow-safety.sh

  pr-batch-big-picture:
    name: PR batch comparison tool tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run PR batch comparison tool tests
        run: python3 tools/test_pr_batch_big_picture.py

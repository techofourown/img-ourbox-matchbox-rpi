name: Official Release Build & Publish (Matchbox)

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

concurrency:
  group: official-release-matchbox-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-publish:
    runs-on: [self-hosted, official-heavy, pi-image]
    timeout-minutes: 240

    steps:
      - name: Fix workspace ownership from previous build
        run: sudo chown -R "$(id -u):$(id -g)" "${GITHUB_WORKSPACE}" 2>/dev/null || true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Bootstrap host dependencies
        run: sudo ./tools/bootstrap-host.sh

      - name: Fetch pinned upstream inputs
        run: ./tools/fetch-airgap-platform.sh

      - name: Build OS image
        run: sudo ./tools/build-image.sh
        env:
          OURBOX_TARGET: rpi
          OURBOX_VARIANT: prod
          OURBOX_VERSION: ${{ github.ref_name }}

      - name: Build installer image
        run: sudo ./tools/build-installer-image.sh
        env:
          OURBOX_TARGET: rpi
          OURBOX_VARIANT: prod
          OURBOX_VERSION: ${{ github.ref_name }}

      - name: Publish OS artifact (official release)
        run: ./tools/publish-os-artifact-official.sh release

      - name: Publish installer artifact (official release)
        run: ./tools/publish-installer-artifact-official.sh release

      - name: Upload provenance outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: provenance-release-${{ github.ref_name }}
          path: |
            deploy/os-artifact.ref
            deploy/os-artifact.pinned.ref
            deploy/os-artifact.digest
            deploy/os-artifact.meta.env
            deploy/installer-artifact.ref
            deploy/installer-artifact.pinned.ref
            deploy/installer-artifact.digest
            deploy/installer-artifact.meta.env
          if-no-files-found: warn

name: Official Release Build & Publish (Matchbox)

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

concurrency:
  group: official-release-matchbox-${{ github.event.release.tag_name || github.run_id }}
  cancel-in-progress: false

jobs:
  build-publish:
    if: startsWith(github.event.release.tag_name, 'v') && !github.event.release.draft
    runs-on: [self-hosted, official-heavy, pi-image]
    timeout-minutes: 240

    steps:
      - name: Fix workspace ownership from previous build
        run: sudo chown -R "$(id -u):$(id -g)" "${GITHUB_WORKSPACE}" 2>/dev/null || true

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive

      - name: Set release version
        run: echo "OURBOX_VERSION=${{ github.event.release.tag_name }}" >> "${GITHUB_ENV}"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Bootstrap host dependencies
        run: sudo ./tools/bootstrap-host.sh

      - name: Fetch pinned upstream inputs
        run: ./tools/fetch-airgap-platform.sh

      - name: Build OS image
        run: sudo ./tools/build-image.sh
        env:
          OURBOX_TARGET: rpi
          OURBOX_VARIANT: prod

      - name: Reclaim build output ownership
        run: sudo chown -R "$(id -u):$(id -g)" deploy/

      - name: Publish OS artifact (official release)
        run: ./tools/publish-os-artifact-official.sh release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}

      - name: Resolve installer default OS ref
        run: |
          set -euo pipefail
          echo "OS_DEFAULT_REF=$(cat deploy/os-artifact.pinned.ref)" >> "${GITHUB_ENV}"

      - name: Build installer image
        run: sudo ./tools/build-installer-image.sh
        env:
          OURBOX_TARGET: rpi
          OURBOX_VARIANT: prod
          OS_REPO: ghcr.io/techofourown/ourbox-matchbox-os
          OS_DEFAULT_REF: ${{ env.OS_DEFAULT_REF }}
          INSTALL_DEFAULTS_REF: ""

      - name: Reclaim installer output ownership
        run: sudo chown -R "$(id -u):$(id -g)" deploy/

      - name: Smoke check baked installer defaults
        run: ./tools/check-installer-defaults-smoke.sh
        env:
          OURBOX_TARGET: rpi
          EXPECTED_OS_DEFAULT_REF: ${{ env.OS_DEFAULT_REF }}

      - name: Publish installer artifact (official release)
        run: ./tools/publish-installer-artifact-official.sh release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}

      - name: Upload provenance outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: provenance-release-${{ github.event.release.tag_name }}
          path: |
            deploy/os-artifact.ref
            deploy/os-artifact.pinned.ref
            deploy/os-artifact.digest
            deploy/os-artifact.meta.env
            deploy/installer-artifact.ref
            deploy/installer-artifact.pinned.ref
            deploy/installer-artifact.digest
            deploy/installer-artifact.meta.env
            deploy/installer-defaults.extracted.env
            deploy/installer-defaults-smoke.txt
          if-no-files-found: warn

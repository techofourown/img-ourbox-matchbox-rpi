name: Official Promote Stable (Matchbox)

on:
  workflow_run:
    workflows: ["Official Candidate Build & Publish (Matchbox)"]
    types: [completed]
  release:
    types: [published]

permissions:
  actions: read
  contents: read
  packages: write

concurrency:
  group: official-promote-stable-matchbox
  cancel-in-progress: false

jobs:
  promote:
    if: >
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.event == 'push') ||
      github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout candidate revision
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout release tag
        if: github.event_name == 'release'
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}
          fetch-depth: 0
          fetch-tags: true

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Resolve promotion context
        id: context
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_IS_DRAFT: ${{ github.event.release.draft }}
          RELEASE_IS_PRERELEASE: ${{ github.event.release.prerelease }}
          PROMOTION_CONTEXT: stable
          CANDIDATE_WORKFLOW_NAME: Official Candidate Build & Publish (Matchbox)
        run: ./tools/release-control/resolve-promotion-context.sh "${PROMOTION_CONTEXT}" "${CANDIDATE_WORKFLOW_NAME}" "${GITHUB_OUTPUT}"

      - name: Download candidate provenance
        if: steps.context.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: provenance-candidate-${{ steps.context.outputs.source_commit }}
          path: deploy/candidate-provenance
          run-id: ${{ steps.context.outputs.candidate_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Locate candidate provenance
        if: steps.context.outputs.skip != 'true'
        run: |
          set -euo pipefail
          file="$(find deploy/candidate-provenance -type f -name 'candidate-provenance.json' | head -n1 || true)"
          [[ -n "${file}" ]] || {
            echo "Missing candidate-provenance.json in downloaded candidate provenance artifact" >&2
            exit 1
          }
          printf 'CANDIDATE_PROVENANCE_JSON=%s\n' "${file}" >> "${GITHUB_ENV}"
          printf 'RELEASE_TAG=%s\n' "${{ steps.context.outputs.release_tag }}" >> "${GITHUB_ENV}"

      - name: Validate candidate provenance
        if: steps.context.outputs.skip != 'true'
        run: |
          python3 ./tools/release-control/release_control.py validate-candidate-provenance \
            --input "${CANDIDATE_PROVENANCE_JSON}" \
            --expected-source-commit "${{ steps.context.outputs.source_commit }}"

      - name: Promote OS artifact to stable
        if: steps.context.outputs.skip != 'true'
        run: ./tools/promote-os-artifact-official.sh stable
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          CANDIDATE_PROVENANCE_JSON: ${{ env.CANDIDATE_PROVENANCE_JSON }}

      - name: Promote installer artifact to stable
        if: steps.context.outputs.skip != 'true'
        run: ./tools/promote-installer-artifact-official.sh stable
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          CANDIDATE_PROVENANCE_JSON: ${{ env.CANDIDATE_PROVENANCE_JSON }}

      - name: Upload provenance outputs
        uses: actions/upload-artifact@v4
        if: steps.context.outputs.skip != 'true' && always()
        with:
          name: provenance-stable-${{ steps.context.outputs.release_tag }}
          path: |
            deploy/os-artifact.ref
            deploy/os-artifact.pinned.ref
            deploy/os-artifact.digest
            deploy/os-artifact.meta.env
            deploy/os-artifact.meta.json
            deploy/os-artifact.promote.source.ref
            deploy/os-artifact.promote.json
            deploy/installer-artifact.ref
            deploy/installer-artifact.pinned.ref
            deploy/installer-artifact.digest
            deploy/installer-artifact.meta.env
            deploy/installer-artifact.meta.json
            deploy/installer-artifact.promote.source.ref
            deploy/installer-artifact.promote.json
          if-no-files-found: error
